{% extends 'base.html' %}

{% block content %}
<h1>{{ 'Sửa nhóm sản phẩm' if category else 'Thêm nhóm sản phẩm' }}</h1>

<form method="POST">
    <div class="mb-3">
        <label for="name" class="form-label">Tên nhóm</label>
        <input type="text" class="form-control" id="name" name="name"
               value="{{ category.name if category else '' }}" required>
    </div>
    <div class="mb-3">
        <label for="description" class="form-label">Mô tả</label>
        <textarea class="form-control" id="description" name="description" rows="3">{{ category.description if category else '' }}</textarea>
    </div>
    <button type="submit" class="btn btn-success">{{ 'Cập nhật' if category else 'Thêm' }}</button>
    <a href="{{ url_for('categories.list') }}" class="btn btn-secondary">Hủy</a>
</form>
{% endblock %}
