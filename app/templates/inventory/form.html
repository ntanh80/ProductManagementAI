{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-white py-3">
                <h5 class="mb-0">
                    {% if transaction_type == 'import' %}
                    <i class="fas fa-plus-circle text-success"></i> Nhập kho
                    {% else %}
                    <i class="fas fa-minus-circle text-warning"></i> Xuất kho
                    {% endif %}
                </h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Sản phẩm <span class="text-danger">*</span></label>
                        <select class="form-select" name="product_id" required>
                            <option value="">-- Chọn sản phẩm --</option>
                            {% for p in products %}
                            <option value="{{ p.id }}">{{ p.name }} (tồn: {{ p.quantity }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Số lượng <span class="text-danger">*</span></label>
                        <input type="number" class="form-control" name="quantity" min="1" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Tham chiếu</label>
                        <input type="text" class="form-control" name="reference"
                               placeholder="Số hóa đơn, phiếu nhập/xuất...">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Ghi chú</label>
                        <textarea class="form-control" name="notes" rows="2"></textarea>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('inventory.list') }}" class="btn btn-secondary">Hủy</a>
                        <button type="submit" class="btn {{ 'btn-success' if transaction_type == 'import' else 'btn-warning' }}">
                            <i class="fas {{ 'fa-plus' if transaction_type == 'import' else 'fa-minus' }}"></i>
                            {{ 'Nhập kho' if transaction_type == 'import' else 'Xuất kho' }}
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
