{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card shadow">
            <div class="card-header bg-primary text-white text-center">
                <h4 class="mb-0"><i class="fas fa-sign-in-alt"></i> {{ _('Đăng nhập') }}</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label">{{ _('Tên đăng nhập / Email') }}</label>
                        <input type="text" class="form-control" id="username" name="username" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">{{ _('Mật khẩu') }}</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">{{ _('Đăng nhập') }}</button>
                    <div class="text-end mt-2">
                        <a href="{{ url_for('auth.forgot_password') }}" class="small">{{ _('Quên mật khẩu?') }}</a>
                    </div>
                </form>
                {% if config.OAUTH_ENABLED %}
                <hr class="my-3">
                <div class="text-center">
                    <a href="{{ url_for('auth.google_login') }}"
                       class="btn btn-outline-dark w-100 d-flex align-items-center justify-content-center gap-2">
                        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.54 28.59A14.5 14.5 0 0 1 9.5 24c0-1.59.28-3.14.76-4.59l-7.98-6.19A23.99 23.99 0 0 0 0 24c0 3.77.87 7.35 2.56 10.56l7.98-5.97z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 5.97C6.51 42.62 14.48 48 24 48z"/></svg>
                        <span>{{ _('Đăng nhập bằng Google') }}</span>
                    </a>
                </div>
                {% endif %}
                <hr>
                <p class="text-center mb-0">
                    {{ _('Chưa có tài khoản?') }}
                    <a href="{{ url_for('auth.register') }}">{{ _('Đăng ký') }}</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
