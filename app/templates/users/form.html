{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h3 mb-0 text-gray-800">
        <i class="fas fa-{{ 'edit' if user else 'user-plus' }}"></i>
        {{ 'Sửa người dùng' if user else 'Thêm người dùng' }}
    </h1>
    <a href="{{ url_for('users.list') }}" class="btn btn-secondary btn-sm">
        <i class="fas fa-arrow-left"></i> Quay lại
    </a>
</div>

<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-sm">
            <div class="card-header bg-white py-3">
                <h6 class="m-0 fw-bold text-primary">
                    <i class="fas fa-{{ 'user-cog' if user else 'user-plus' }}"></i>
                    {{ 'Thông tin người dùng' if user else 'Tạo tài khoản mới' }}
                </h6>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Tên đăng nhập <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" name="username"
                                   value="{{ user.username if user else '' }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Họ tên</label>
                            <input type="text" class="form-control" name="full_name"
                                   value="{{ user.full_name if user else '' }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Email</label>
                            <input type="email" class="form-control" name="email"
                                   value="{{ user.email if user else '' }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Số điện thoại</label>
                            <input type="text" class="form-control" name="phone"
                                   value="{{ user.phone if user else '' }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">
                                Mật khẩu{% if not user %} <span class="text-danger">*</span>{% endif %}
                                {% if user %}
                                    <br><span class="text-muted fw-normal small">(Để trống nếu không đổi)</span>
                                {% endif %}
                            </label>
                            <input type="password" class="form-control" name="password"
                                   {{ 'required' if not user else '' }}>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Vai trò</label>
                            <select class="form-select" name="role">
                                <option value="user" {{ 'selected' if user and user.role == 'user' else '' }}>User</option>
                                <option value="admin" {{ 'selected' if user and user.role == 'admin' else '' }}>Admin</option>
                            </select>
                        </div>
                    </div>
                    <hr class="my-3">
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> {{ 'Cập nhật' if user else 'Tạo mới' }}
                        </button>
                        <a href="{{ url_for('users.list') }}" class="btn btn-secondary">
                            <i class="fas fa-times"></i> Hủy
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
