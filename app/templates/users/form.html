{% extends 'base.html' %}

{% block content %}
<h1>{{ 'Sửa người dùng' if user else 'Thêm người dùng' }}</h1>

<form method="POST">
    <div class="mb-3">
        <label for="username" class="form-label">Tên đăng nhập</label>
        <input type="text" class="form-control" id="username" name="username"
               value="{{ user.username if user else '' }}" required>
    </div>
    <div class="mb-3">
        <label for="full_name" class="form-label">Họ tên</label>
        <input type="text" class="form-control" id="full_name" name="full_name"
               value="{{ user.full_name if user else '' }}">
    </div>
    <div class="mb-3">
        <label for="password" class="form-label">
            Mật khẩu{{ ' (để trống nếu không đổi)' if user else '' }}
        </label>
        <input type="password" class="form-control" id="password" name="password"
               {{ 'required' if not user else '' }}>
    </div>
    <div class="mb-3">
        <label for="role" class="form-label">Vai trò</label>
        <select class="form-select" id="role" name="role">
            <option value="user" {{ 'selected' if user and user.role == 'user' else '' }}>User</option>
            <option value="admin" {{ 'selected' if user and user.role == 'admin' else '' }}>Admin</option>
        </select>
    </div>
    <button type="submit" class="btn btn-success">{{ 'Cập nhật' if user else 'Thêm' }}</button>
    <a href="{{ url_for('users.list') }}" class="btn btn-secondary">Hủy</a>
</form>
{% endblock %}
